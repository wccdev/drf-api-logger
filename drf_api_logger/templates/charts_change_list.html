{% extends "admin/change_list.html" %}
{% load static %}

<!-- Override extrahead to add Chart.js -->
{% block extrahead %}
{{ block.super }}
<script src="https://cdn.jsdelivr.net/npm/chart.js@^3"></script>
<script src="https://cdn.jsdelivr.net/npm/moment@^2"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@^1"></script>
<script>

document.addEventListener('DOMContentLoaded', () => {
  const ctx = document.getElementById('countChart').getContext('2d');

  const chartData = [
    {% for item in analytics %}
    {"date": "{{ item.added_on__date }}", "y": {{ item.total }}},
    {% endfor %}
  ];

  // Parse the dates to JS
  chartData.forEach((d) => {
    d.x = new Date(d.date);
  });

  // Render the chart
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: 'Number of API calls',
          data: chartData,
          backgroundColor: 'rgb(33,150,243)',
        },
      ],
    },
    options: {
      responsive: true,
      scales: {
        x: {
            type: 'time',
            display: true,
            time: {
              unit: 'day',
              round: 'day',
              tooltipFormat:'YYYY/MM/DD',
              displayFormats: {
                day: 'MMM DD',
              },
            },
        },
        y: {
            min: 0,
            beginAtZero: true,
            ticks: {
              // forces step size to be 50 units
              // stepSize: 50,
              precision: 0
            }
        }
        }
    },
  });

  var color = Chart.helpers.color;

  var barChartData = {
      labels: {{ status_code_count_keys }},
      datasets: [{
          label: 'Number of API calls by status code',
          backgroundColor: 'rgb(33,150,243)',
          borderColor: 'rgb(33,150,243)',
          borderWidth: 1,
          data: {{ status_code_count_values }}
      }]
  };

  window.onload = function() {
      var ctx = document.getElementById('statusCodeChart').getContext('2d');
      window.myBar = new Chart(ctx, {
          type: 'bar',
          data: barChartData,
          options: {
              responsive: true,
              legend: {
                  position: 'top',
              },
              title: {
                  display: true,
                  text: 'API calls by status code'
              },
              scales: {
                  y: {
                      min: 0,
                      beginAtZero: true,
                      ticks: {
                        // forces step size to be 50 units
                        // stepSize: 50,
                        precision: 0
                      }
                  }
              }
          }
      });

  };
});
</script>
{% endblock %}

{% block content %}
<!-- Render our chart -->
<div style="width: 80%;">
  <canvas style="margin-bottom: 30px; width: 60%; height: 50%;" id="countChart"></canvas>
</div>
<div style="width: 80%; margin-top: 24px;">
  <canvas style="margin-bottom: 30px; width: 60%; height: 50%;" id="statusCodeChart"></canvas>
</div>
<!-- Render the rest of the ChangeList view -->
{{ block.super }}
{% endblock %}
